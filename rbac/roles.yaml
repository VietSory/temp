---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer
  namespace: demo
rules:
  # Core resources trong namespace demo
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - configmaps
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # Workload resources trong namespace demo
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre
rules:
  # SRE thao tác pod toàn cụm
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # Cho phép xem namespace để debug toàn cụm
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
    verbs:
      - get
      - list
      - watch

  # Cho phép xem workload liên quan đến pod
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: viewer
rules:
  # Read-only core resources toàn cụm
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - configmaps
      - namespaces
      - nodes
    verbs:
      - get
      - list
      - watch

  # Read-only workload resources toàn cụm
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch

  # Read-only Argo Rollouts nếu cluster có CRD này
  - apiGroups: ["argoproj.io"]
    resources:
      - rollouts
      - experiments
      - analysisruns
      - analysistemplates
    verbs:
      - get
      - list
      - watch