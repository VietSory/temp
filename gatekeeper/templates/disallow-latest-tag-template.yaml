apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdisallowedlatesttag
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  crd:
    spec:
      names:
        kind: K8sDisallowedLatestTag
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdisallowedlatesttag

        pod_spec = spec {
          input.review.kind.kind == "Pod"
          spec := input.review.object.spec
        }

        pod_spec = spec {
          spec := input.review.object.spec.template.spec
        }

        containers[container] {
          container := pod_spec.containers[_]
        }

        containers[container] {
          container := pod_spec.initContainers[_]
        }

        violation[{"msg": msg}] {
          container := containers[_]
          endswith(container.image, ":latest")
          msg := sprintf("container <%s> uses disallowed image tag :latest: <%s>", [container.name, container.image])
        }
