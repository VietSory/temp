apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payments-dev-default-deny-ingress
  namespace: payments-dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payments-dev-egress-same-ns-and-dns
  namespace: payments-dev
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
