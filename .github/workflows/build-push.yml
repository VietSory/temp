name: Build Scan Sign

on:
  push:
    branches:
      - lab-2-1-eso
    paths:
      - Dockerfile
      - app.py
      - signing/cosign.pub
      - .github/workflows/build-push.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-scan-sign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE=ghcr.io/${OWNER_LC}/w10-api:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        shell: bash
        run: |
          docker build -t "${IMAGE}" .

      - name: Trivy scan HIGH/CRITICAL
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: false

      - name: Push image
        shell: bash
        run: |
          docker push "${IMAGE}"
          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}")"
          echo "IMAGE_DIGEST=${DIGEST}" >> "$GITHUB_ENV"
          echo "Pushed digest: ${DIGEST}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.0
        with:
          cosign-release: 'v2.6.1'

      - name: Sign image digest
        shell: bash
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          printf '%s' "${COSIGN_PRIVATE_KEY}" > cosign.key
          cosign sign --yes --key cosign.key "${IMAGE_DIGEST}"
          rm -f cosign.key

      - name: Verify image signature
        shell: bash
        run: |
          cosign verify --key signing/cosign.pub "${IMAGE_DIGEST}"
