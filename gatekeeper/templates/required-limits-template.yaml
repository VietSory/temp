apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredlimits
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredLimits
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredlimits

        import rego.v1

        pod_spec := input.review.object.spec if {
          input.review.kind.kind == "Pod"
        }

        pod_spec := input.review.object.spec.template.spec if {
          input.review.object.spec.template.spec
        }

        containers contains container if {
          container := pod_spec.containers[_]
        }

        containers contains container if {
          container := pod_spec.initContainers[_]
        }

        violation contains {"msg": msg} if {
          container := containers[_]
          not container.resources.limits
          msg := sprintf("container <%s> must define resources.limits", [container.name])
        }

        violation contains {"msg": msg} if {
          container := containers[_]
          container.resources.limits
          count(container.resources.limits) == 0
          msg := sprintf("container <%s> must define non-empty resources.limits", [container.name])
        }