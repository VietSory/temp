apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdisallowedlatesttag
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  crd:
    spec:
      names:
        kind: K8sDisallowedLatestTag
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdisallowedlatesttag

        import rego.v1

        pod_spec := input.review.object.spec if {
          input.review.kind.kind == "Pod"
        }

        pod_spec := input.review.object.spec.template.spec if {
          input.review.object.spec.template.spec
        }

        containers contains container if {
          container := pod_spec.containers[_]
        }

        containers contains container if {
          container := pod_spec.initContainers[_]
        }

        violation contains {"msg": msg} if {
          container := containers[_]
          endswith(container.image, ":latest")
          msg := sprintf("container <%s> uses disallowed image tag :latest: <%s>", [container.name, container.image])
        }